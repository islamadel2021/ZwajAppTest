<!-- home.component.html -->

<div class="rtl container mt-5">
  <!-- ✅ الصفحة الرئيسية -->
  @if (!registerMode()) {
    <div style="text-align: center">
      <h2 style="font-family: &quot;JF FLAT&quot;">
        زواج يأتي لك بشريكك في الحياة
      </h2>
      <h5 style="font-family: &quot;JF FLAT&quot;">
        تخيل حياتك مع توأم روحك. مع زواج، أنت الآن على بعد خطوة من تحقيق حلمك
      </h5>
      <div class="text-center">
        <button
          (click)="registerToggle()"
          style="font-family: &quot;JF FLAT&quot;"
          class="btn btn-secondary btn-lg"
        >
          إشترك معنا
        </button>
      </div>
    </div>
  }

  <!-- ✅ فورم التسجيل -->
  @if (registerMode()) {
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-4">
          <app-register (cancelRegister)="registerToggle()" />
        </div>
      </div>
    </div>
  }
</div>
